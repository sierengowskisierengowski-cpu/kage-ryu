# /etc/logrotate.d/jett
#
# Log rotation for the jeTT real-time eBPF verdict daemon.
# Install path: /etc/logrotate.d/jett  (done by sensor/install.sh)

/var/log/jett/jett.log {
    # Rotate once a week
    weekly

    # Keep 4 weeks of history
    rotate 4

    # Compress rotated logs with gzip
    compress

    # Delay compression by one rotation cycle (so the just-rotated log
    # isn't compressed immediately, making it easy to inspect)
    delaycompress

    # Don't error if the log file is missing (daemon may not have written yet)
    missingok

    # Don't rotate if the log is empty
    notifempty

    # Create a new empty log after rotation with these permissions
    create 0640 root root

    # Use copytruncate so jeTT doesn't need a HUP signal; the daemon writes
    # to a path, not to a held fd, so truncation is safe.
    copytruncate

    # Post-rotate: optionally reload jeTT if it holds the fd open.
    # Uncomment if you switch to fd-based logging in the future:
    # postrotate
    #     systemctl kill --kill-who=main --signal=HUP jett.service 2>/dev/null || true
    # endscript
}
